<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="TazanAI - Asisten AI cerdas ">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="tazan">
    <link rel="icon" type="image/png" href="/static/favicon-96x96.png?v=1" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=1">
    <link rel="shortcut icon" href="/static/favicon.ico?v=1">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png?v=1">
    <link rel="manifest" href="/static/site.webmanifest?v=1">
    <title>TazanAI - AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="particles" id="particles"></div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <div class="logo-icon">
                    <img src="/static/favicon-96x96.png" alt="TazanAI Logo" width="36" height="36">
                </div>
                <span>TazanAI</span>
            </div>
            <button class="sidebar-close" id="sidebarClose">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                    <path d="M18 6L6 18M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <div class="sidebar-content">
            <button class="btn-new-chat" id="btnClear">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
                <span>Percakapan Baru</span>
            </button>
        </div>

        <div class="sidebar-footer">
            <div class="info-card">
                <span class="info-dot"></span>
                <span id="modelBadge">Model R1</span>
            </div>
            <div class="info-card">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
                    <circle cx="12" cy="12" r="10"/>
                    <polyline points="12 6 12 12 16 14"/>
                </svg>
                <span id="currentTime"></span>
            </div>
            <div class="info-card" id="memoryInfo" style="display:none;">
                <span class="info-label">Memory</span>
                <span id="memoryCount">0 pesan</span>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <div class="top-bar">
            <button class="hamburger-btn" id="hamburgerToggle">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="top-bar-title">
                <h1>TazanAI</h1>
                <p>Asisten AI cerdas untuk Anda</p>
            </div>
            <button class="new-chat-btn" id="btnClearTop">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                    <path d="M12 5v14M5 12h14"/>
                </svg>
            </button>
        </div>

        <div class="chat-container">
            <div class="chat-messages" id="chatMessages">
                <div class="welcome-message" id="welcomeMessage">
                    <div class="welcome-icon">
                        <img src="https://img.icons8.com/?size=100&id=qCyjxePmto0j&format=png&color=000000" alt="TazanAI" width="80" height="80" style="filter: brightness(0) invert(1);">
                    </div>
                    <h2>Halo! Saya TazanAI 👋</h2>
                    <p>Tanya apa saja, saya siap membantu Anda 24/7</p>
                </div>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Ketik pesan..." rows="1"></textarea>
                <button class="btn-send" id="btnSend">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13"/>
                        <path d="M22 2L15 22l-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
            <span class="input-hint"> </span>
        </div>
    </main>

    <div class="install-banner" id="installBanner">
        <div class="install-banner-content">
            <span>📱 Install TazanAI di HP kamu</span>
            <button id="btnInstall">Install</button>
            <button id="btnDismiss">✕</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
