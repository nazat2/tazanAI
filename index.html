<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="TazanAI - Asisten AI cerdas berbasis DeepSeek">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="tazan">
    <link rel="icon" type="image/png" href="/static/favicon-96x96.png?v=1" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=1">
    <link rel="shortcut icon" href="/static/favicon.ico?v=1">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png?v=1">
    <link rel="manifest" href="/static/site.webmanifest?v=1">
    <title>TazanAI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-grid"></div>
    <div class="particles" id="particles"></div>
    <div class="overlay" id="overlay"></div>

    <div class="container">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <img src="/static/favicon-96x96.png" alt="TazanAI Logo" width="36" height="36">
                    </div>
                    <span>TazanAI</span>
                </div>
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22">
                        <line class="hamburger-line hamburger-top" x1="3" y1="6" x2="21" y2="6"/>
                        <line class="hamburger-line hamburger-middle" x1="3" y1="12" x2="21" y2="12"/>
                        <line class="hamburger-line hamburger-bottom" x1="3" y1="18" x2="21" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="sidebar-content">
                <button class="btn-new-chat" id="btnClear">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    <span>Percakapan Baru</span>
                </button>
                <div class="sidebar-info">
                    <div class="info-card">
                        <span class="info-dot"></span>
                        <span id="modelBadge">DeepSeek R1 + Chat</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Waktu</span>
                        <span class="info-value" id="currentTime"></span>
                    </div>
                    <div class="info-card" id="memoryInfo" style="display:none;">
                        <span class="info-label">Memory</span>
                        <span class="info-value" id="memoryCount">0 pesan</span>
                    </div>
                </div>
            </div>
            <div class="sidebar-footer">
                <span>&copy; 2026 TazanAI</span>
            </div>
        </div>

        <div class="main">
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="welcome-message" id="welcomeMessage">
                        <div class="welcome-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <circle cx="12" cy="12" r="10"/>
                                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                                <path d="M9 9h.01M15 9h.01"/>
                            </svg>
                        </div>
                        <h2>Halo, aku TazanAI</h2>
                        <p>Tanya apa saja, aku siap bantu.</p>
                    </div>
                </div>
            </div>
            <div class="chat-input-area">
                <div class="input-wrapper">
                    <textarea id="userInput" placeholder="Ketik pesan..." rows="1" autofocus></textarea>
                    <button class="btn-send" id="btnSend" aria-label="Kirim pesan">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13"/>
                            <path d="M22 2L15 22l-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
                <span class="input-hint">Enter kirim, Shift+Enter baris baru</span>
            </div>
        </div>
    </div>

    <div class="install-banner" id="installBanner">
        <div class="install-banner-content">
            <span>📱 Install TazanAI di HP kamu</span>
            <button id="btnInstall">Install</button>
            <button id="btnDismiss">✕</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
